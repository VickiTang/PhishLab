<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhishLab - フィッシング分析シミュレーター</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      background: #f8fafc;
      color: #0f172a;
      display: flex;
      flex-direction: column;
      min-width: 1024px;
    }

    /* ===== HEADER ===== */
    header {
      height: 60px;
      background: #1e293b;
      color: #fff;
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      flex-shrink: 0;
      border-bottom: 1px solid #334155;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header .title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    header .subtitle {
      font-size: 11px;
      color: #f59e0b;
      font-weight: 500;
      opacity: 0.9;
      white-space: nowrap;
    }

    /* ===== MAIN LAYOUT ===== */
    .main-layout {
      display: flex;
      flex: 1;
    }

    /* ===== SIDEBAR (EMAIL LIST) ===== */
    .sidebar {
      width: 35%;
      background: #fff;
      border-right: 1px solid #e2e8f0;
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 60px;
      height: calc(100vh - 60px);
      overflow-y: auto;
    }

    .sidebar-header {
      padding: 14px 16px 12px;
      font-size: 12px;
      font-weight: 700;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background: #f1f5f9;
      border-bottom: 1px solid #e2e8f0;
      flex-shrink: 0;
    }

    .email-list {
      flex: 1;
      overflow-y: auto;
      list-style: none;
    }

    .email-item {
      padding: 12px 16px;
      border-bottom: 1px solid #f1f5f9;
      cursor: pointer;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      transition: background 0.12s ease;
      border-left: 4px solid transparent;
    }

    .email-item:hover {
      background: #eff6ff;
    }

    .email-item.selected {
      background: #dbeafe;
      border-left-color: #2563eb !important;
    }

    .email-item.risk-red  { border-left-color: #dc2626; }
    .email-item.risk-yellow { border-left-color: #f59e0b; }
    .email-item.risk-green  { border-left-color: #16a34a; }

    .email-icon {
      font-size: 18px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .email-meta {
      flex: 1;
      min-width: 0;
    }

    .email-sender {
      font-size: 13px;
      font-weight: 700;
      color: #0f172a;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .email-subject {
      font-size: 12px;
      color: #64748b;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 3px;
    }

    /* A4: Smaller generate button */
    .sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid #e2e8f0;
      background: #f8fafc;
      flex-shrink: 0;
      display: flex;
      justify-content: center;
    }

    .btn-generate {
      width: auto;
      padding: 8px 16px;
      background: #1e293b;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.03em;
      transition: all 0.15s ease;
    }

    .btn-generate:hover {
      background: #334155;
    }

    .btn-generate:active {
      transform: scale(0.96);
      background: #0f172a;
    }

    .btn-generate:disabled {
      background: #94a3b8;
      cursor: not-allowed;
      transform: none;
    }

    .last-updated {
      font-size: 10px;
      color: #94a3b8;
      font-weight: 500;
      text-transform: none;
      letter-spacing: 0.02em;
      margin-top: 2px;
    }

    /* ===== MAIN CONTENT ===== */
    .content {
      width: 65%;
      display: flex;
      flex-direction: column;
    }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      color: #94a3b8;
      min-height: 400px;
    }

    .empty-state .empty-icon { font-size: 48px; }
    .empty-state .empty-text { font-size: 16px; font-weight: 500; }

    /* A3: Email detail as flex column — header + body + card all visible */
    .email-detail {
      flex: 1;
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* A1: Email header — grid layout so label and value stay on the same line */
    .detail-header {
      flex-shrink: 0;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      overflow: hidden;
    }

    .detail-header-row {
      display: grid;
      grid-template-columns: 100px 1fr;
      align-items: baseline;
      padding: 8px 16px;
      gap: 12px;
      border-bottom: 1px solid #f1f5f9;
    }

    .detail-header-row:last-child {
      border-bottom: none;
    }

    .detail-label {
      font-size: 11px;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .detail-value {
      font-family: "SF Mono", "Menlo", "Consolas", "Courier New", monospace;
      font-size: 13px;
      color: #0f172a;
      font-weight: 500;
      word-break: break-all;
    }

    /* A2 + A3: Body wrapper — continuous left border, expands naturally */
    .body-wrapper {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      border-left: 4px solid #94a3b8;
    }

    .body-wrapper.risk-red    { border-left-color: #dc2626; }
    .body-wrapper.risk-yellow { border-left-color: #f59e0b; }
    .body-wrapper.risk-green  { border-left-color: #16a34a; }

    .detail-body {
      padding: 20px 20px 20px 16px;
      font-size: 15px;
      line-height: 1.7;
      color: #1e293b;
      white-space: pre-wrap;
    }

    /* A3: Detection card — always anchored at bottom */
    .detection-card {
      flex-shrink: 0;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .detection-card-header {
      padding: 14px 16px 10px;
      background: #1e293b;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .detection-card-body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .risk-badge {
      background: #dc2626;
      color: #fff;
      padding: 14px 16px;
      border-radius: 8px;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0.02em;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .risk-badge.risk-yellow { background: #f59e0b; }
    .risk-badge.risk-green  { background: #16a34a; }

    .score-text {
      font-size: 15px;
      font-weight: 500;
      opacity: 0.9;
    }

    .reasons-section { padding: 0 4px; }

    .reasons-title {
      font-size: 12px;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .reasons-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .reasons-list li {
      font-size: 13px;
      color: #1e293b;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      line-height: 1.5;
    }

    .reasons-list li::before {
      content: "•";
      color: #dc2626;
      font-weight: 900;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .tip-box {
      background: #fefce8;
      border: 1px solid #fde047;
      border-radius: 6px;
      padding: 12px 14px;
      font-size: 13px;
      color: #713f12;
      line-height: 1.6;
    }

    .tip-box.tip-yellow {
      background: #fffbeb;
      border-color: #fcd34d;
      color: #92400e;
    }

    .tip-box.tip-green {
      background: #f0fdf4;
      border-color: #86efac;
      color: #14532d;
    }

    .loading-state {
      padding: 20px;
      text-align: center;
      color: #64748b;
      font-size: 14px;
    }

    .error-state {
      padding: 16px;
      color: #dc2626;
      font-size: 13px;
      font-weight: 600;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 767px) {
      body { min-width: unset; }
      .main-layout { flex-direction: column; }
      .sidebar { width: 100%; position: static; height: auto; max-height: 40vh; }
      .content { width: 100%; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="title">🛡️ PhishLab - フィッシング分析シミュレーター</div>
    <div class="subtitle">⚠️ 全データは合成データです・実在企業情報を含みません</div>
  </header>

  <!-- MAIN LAYOUT -->
  <div class="main-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div>📥 受信トレイ (Simulated Inbox)</div>
        <div class="last-updated" id="last-updated">最終更新: --:--:--</div>
      </div>
      <ul class="email-list" id="email-list">
        <!-- Populated by JavaScript on load -->
      </ul>
      <div class="sidebar-footer">
        <button class="btn-generate" id="btn-generate">新規メール生成 +</button>
      </div>
    </aside>

    <!-- CONTENT -->
    <main class="content">

      <!-- Empty state (shown until first email loads) -->
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">📬</div>
        <div class="empty-text">左側のメールを選択してください</div>
      </div>

      <!-- Email detail (hidden initially, shown after selection) -->
      <div class="email-detail" id="email-detail" style="display:none">

        <!-- A1: Header with grid layout — label and value on same row, no divider between them -->
        <div class="detail-header">
          <div class="detail-header-row">
            <span class="detail-label">差出人</span>
            <span class="detail-value" id="detail-from"></span>
          </div>
          <div class="detail-header-row">
            <span class="detail-label">件名</span>
            <span class="detail-value" id="detail-subject"></span>
          </div>
          <div class="detail-header-row">
            <span class="detail-label">日時</span>
            <span class="detail-value" id="detail-date"></span>
          </div>
        </div>

        <!-- A2: Body wrapper holds the continuous left border; expands naturally -->
        <div class="body-wrapper" id="body-wrapper">
          <div class="detail-body" id="detail-body-text"></div>
        </div>

        <!-- A3: Detection card — anchored at bottom -->
        <div class="detection-card">
          <div class="detection-card-header">🛡️ PhishLab 検出結果</div>
          <div class="detection-card-body" id="detection-content">
            <div class="loading-state">メールを選択してください</div>
          </div>
        </div>

      </div>
    </main>

  </div>

  <script>
    /* PhishLab frontend — no external dependencies */

    const emailListEl      = document.getElementById('email-list');
    const emptyStateEl     = document.getElementById('empty-state');
    const emailDetailEl    = document.getElementById('email-detail');
    const detailFromEl     = document.getElementById('detail-from');
    const detailSubjectEl  = document.getElementById('detail-subject');
    const detailDateEl     = document.getElementById('detail-date');
    const detailBodyEl     = document.getElementById('detail-body-text');
    const bodyWrapperEl    = document.getElementById('body-wrapper');
    const detectionContentEl = document.getElementById('detection-content');

    const lastUpdatedEl    = document.getElementById('last-updated');
    const btnGenerateEl    = document.getElementById('btn-generate');

    let emailsData = [];

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function formatJapaneseDate(date) {
      return date.toLocaleDateString('ja-JP', {
        year: 'numeric', month: 'long', day: 'numeric',
        weekday: 'short', hour: '2-digit', minute: '2-digit'
      });
    }

    function formatTime(date) {
      return date.toTimeString().split(' ')[0];
    }

    async function loadInbox() {
      try {
        const res = await fetch('api/inbox');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        emailsData = await res.json();

        emailListEl.innerHTML = '';
        emailsData.forEach(email => {
          const li = document.createElement('li');
          li.className = 'email-item';
          li.dataset.emailId = email.id;
          li.innerHTML = `
            <span class="email-icon">⏳</span>
            <div class="email-meta">
              <div class="email-sender">${escHtml(email.fromName)}</div>
              <div class="email-subject">${escHtml(email.subject)}</div>
            </div>
          `;
          li.addEventListener('click', () => selectEmail(email));
          emailListEl.appendChild(li);
        });

        // Update timestamp
        lastUpdatedEl.textContent = `最終更新: ${formatTime(new Date())}`;

        if (emailsData.length > 0) {
          await selectEmail(emailsData[0]);
        }
      } catch (err) {
        emailListEl.innerHTML =
          '<li style="padding:16px;color:#dc2626;font-size:13px;">エラー: 接続できません</li>';
      }
    }

    async function selectEmail(email) {
      // Highlight selected item in list
      document.querySelectorAll('.email-item').forEach(el => el.classList.remove('selected'));
      const listItem = document.querySelector(`[data-email-id="${CSS.escape(email.id)}"]`);
      if (listItem) listItem.classList.add('selected');

      // Switch from empty state to email detail view
      emptyStateEl.style.display = 'none';
      emailDetailEl.style.display = 'flex';

      // Populate header fields (textContent avoids XSS)
      detailFromEl.textContent    = `${email.fromName} <${email.fromAddress}>`;
      detailSubjectEl.textContent = email.subject;
      detailDateEl.textContent    = formatJapaneseDate(new Date());

      // Populate body (pre-wrap handled by CSS)
      detailBodyEl.textContent = email.body;

      // Reset border color while detection is in progress
      bodyWrapperEl.className = 'body-wrapper';

      // Show loading indicator in detection card
      detectionContentEl.innerHTML = '<div class="loading-state">🛡️ 検出中...</div>';

      // Scroll to top of email detail when selecting a new email
      window.scrollTo({ top: 0, behavior: 'smooth' });

      // Call detection API
      try {
        const res = await fetch('api/check-email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json; charset=UTF-8' },
          body: JSON.stringify({
            fromName:    email.fromName,
            fromAddress: email.fromAddress,
            subject:     email.subject,
            body:        email.body
          })
        });

        if (!res.ok) throw new Error('API error ' + res.status);
        const result = await res.json();

        // Use overallRisk for global UI state
        const overallRisk = result.overallRisk || result.riskLevel;

        renderDetectionResult(result);
        applyRiskBorderColor(overallRisk);
        updateListItem(email.id, overallRisk);

      } catch (err) {
        detectionContentEl.innerHTML =
          '<div class="error-state">エラー: 接続できません</div>';
      }
    }

    function renderDetectionResult(data) {
      // Fault tolerance for new/old API formats
      const urls = data.urls || [];
      const overallRisk = data.overallRisk || data.riskLevel;
      const overallScore = data.overallScore !== undefined ? data.overallScore : data.score;
      const becResult = data.bec || { 
        riskLevel: data.riskLevel, 
        riskLabel: data.riskLabel, 
        score: data.score, 
        reasons: data.reasons 
      };

      // 3. Top Large Risk Badge
      let badgeClass = '', badgeIcon = '', badgeLabel = '';
      if (overallRisk === 'RED') {
        badgeIcon = '⛔'; badgeLabel = '高リスク';
      } else if (overallRisk === 'YELLOW') {
        badgeClass = 'risk-yellow'; badgeIcon = '⚠️'; badgeLabel = '中リスク';
      } else {
        badgeClass = 'risk-green';  badgeIcon = '✓'; badgeLabel = '低リスク';
      }

      // 2. Sub-card A: BEC Detection
      let becBg = '#f0fdf4';
      let becTextColor = '#16a34a';
      let becLabel = '✓ 低リスク';
      if (becResult.riskLevel === 'RED') {
        becBg = '#fef2f2'; becTextColor = '#dc2626'; becLabel = '⛔ 高リスク';
      } else if (becResult.riskLevel === 'YELLOW') {
        becBg = '#fffbeb'; becTextColor = '#f59e0b'; becLabel = '⚠️ 中リスク';
      }

      const becReasonsHtml = (becResult.reasons || [])
        .map(r => `<li>${escHtml(r)}</li>`)
        .join('');

      const becCardHtml = `
        <div style="background:${becBg}; padding:12px; border-radius:8px; border:1px solid rgba(0,0,0,0.05);">
          <div style="font-size:13px; font-weight:700; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center;">
            <span>📧 BECパターン検出</span>
            <span style="font-size:11px; font-weight:500; background:rgba(255,255,255,0.6); padding:2px 6px; border-radius:4px;">Score: ${becResult.score}</span>
          </div>
          <div style="font-size:12px; font-weight:800; color:${becTextColor}; margin-bottom:8px; display:flex; align-items:center; gap:4px;">
            ${becLabel}
          </div>
          <ul class="reasons-list" style="margin-top:4px;">${becReasonsHtml}</ul>
        </div>
      `;

      // 2. Sub-card B: URL Detection
      let urlsCardHtml = '';
      if (urls.length > 0) {
        const urlItemsHtml = urls.map((u, idx) => {
          const uReasonsHtml = (u.reasons || [])
            .map(r => `<li>${escHtml(r)}</li>`)
            .join('');
          
          let uColor = '#16a34a', uLabel = '✓ 低リスク';
          if (u.riskLevel === 'RED') { uColor = '#dc2626'; uLabel = '⛔ 高リスク'; }
          else if (u.riskLevel === 'YELLOW') { uColor = '#f59e0b'; uLabel = '⚠️ 中リスク'; }

          let layerLabel = "";
          if (u.detectionLayer === "blocklist_url" || u.detectionLayer === "blocklist_domain") {
            layerLabel = '<span style="font-size:10px; background:#fee2e2; color:#dc2626; padding:2px 6px; border-radius:4px; margin-left:8px; white-space:nowrap;">脅威情報DBヒット</span>';
          } else if (u.detectionLayer === "algorithm") {
            layerLabel = '<span style="font-size:10px; background:#f1f5f9; color:#64748b; padding:2px 6px; border-radius:4px; margin-left:8px; white-space:nowrap;">アルゴリズム検出</span>';
          }
          
          return `
            <div style="${idx > 0 ? 'border-top:1px solid #f1f5f9; margin-top:12px; padding-top:12px;' : ''}">
              <div style="display:flex; align-items:center; margin-bottom:8px;">
                <code style="flex:1; background:#f8fafc; border:1px solid #e2e8f0; padding:4px 8px; border-radius:4px; font-size:11px; word-break:break-all; color:#475569; font-family:monospace;">${escHtml(u.url)}</code>
                ${layerLabel}
              </div>
              <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px;">
                <span style="font-size:12px; color:#475569;">ドメイン: <strong style="color:#0f172a;">${escHtml(u.domain)}</strong></span>
                <span style="font-size:11px; font-weight:800; color:${uColor};">${uLabel} (Score: ${u.score})</span>
              </div>
              <ul class="reasons-list">${uReasonsHtml}</ul>
            </div>
          `;
        }).join('');

        urlsCardHtml = `
          <div style="background:#fff; border:1px solid #e2e8f0; padding:12px; border-radius:8px;">
            <div style="font-size:13px; font-weight:700; margin-bottom:12px; display:flex; align-items:center; gap:6px;">
              <span>🔗 URLリンク検出</span>
              <span style="font-size:11px; font-weight:500; background:#f1f5f9; color:#64748b; padding:1px 6px; border-radius:10px;">${urls.length} 件</span>
            </div>
            ${urlItemsHtml}
          </div>
        `;
      }

      // Tip box
      let tipHtml = '';
      if (overallRisk === 'RED') {
        tipHtml = `<div class="tip-box">💡 このメールには返信せず、システム部に報告してください。</div>`;
      } else if (overallRisk === 'YELLOW') {
        tipHtml = `<div class="tip-box tip-yellow">💡 このメールは要注意です。リンクや添付を開く前に確認を。</div>`;
      } else {
        tipHtml = `<div class="tip-box tip-green">✓ このメールは安全と判定されました。</div>`;
      }

      detectionContentEl.innerHTML = `
        <div class="risk-badge ${badgeClass}">
          ${badgeIcon} ${escHtml(badgeLabel)}
          <span class="score-text">Score: ${escHtml(String(overallScore))} / 100</span>
        </div>
        ${becCardHtml}
        ${urlsCardHtml}
        ${tipHtml}
      `;
    }

    function applyRiskBorderColor(riskLevel) {
      bodyWrapperEl.className = 'body-wrapper';
      if (riskLevel === 'RED')    bodyWrapperEl.classList.add('risk-red');
      else if (riskLevel === 'YELLOW') bodyWrapperEl.classList.add('risk-yellow');
      else                        bodyWrapperEl.classList.add('risk-green');
    }

    function updateListItem(emailId, riskLevel) {
      const item = document.querySelector(`[data-email-id="${CSS.escape(emailId)}"]`);
      if (!item) return;
      item.classList.remove('risk-red', 'risk-yellow', 'risk-green');
      const icon = item.querySelector('.email-icon');
      if (riskLevel === 'RED') {
        item.classList.add('risk-red');
        icon.textContent = '⛔';
      } else if (riskLevel === 'YELLOW') {
        item.classList.add('risk-yellow');
        icon.textContent = '⚠️';
      } else {
        item.classList.add('risk-green');
        icon.textContent = '✓';
      }
    }

    // Generate button fetches new emails without reload
    btnGenerateEl.addEventListener('click', async () => {
      btnGenerateEl.disabled = true;
      btnGenerateEl.textContent = '生成中...';
      
      try {
        await loadInbox();
      } finally {
        btnGenerateEl.disabled = false;
        btnGenerateEl.textContent = '新規メール生成 +';
      }
    });

    // Load inbox on page ready
    document.addEventListener('DOMContentLoaded', loadInbox);
  </script>

</body>
